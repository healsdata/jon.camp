{{ define "main" }}
  <h1>{{ .Title }}</h1>

  {{ with .Content }}
    <div class="section-intro">{{ . }}</div>
  {{ end }}

  {{- $paginator := .Paginate (sort .Pages ".Date" "desc") }}
  <div class="links-list">
    {{ range $paginator.Pages }}
      {{ partial "post-card.html" . }}
    {{ end }}
  </div>

  {{ template "_internal/pagination.html" . }}
{{ end }}
